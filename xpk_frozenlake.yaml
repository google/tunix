apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: frozenlake
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: multislice-queue
spec:
  failurePolicy:
    maxRestarts: 0
  replicatedJobs:
  # -------------------------------------------------------------
  # 1. PATHWAYS COORDINATOR (CPU HEAD)
  # -------------------------------------------------------------
  - name: pathways-head
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        template:
          metadata:
            labels:
              kueue.x-k8s.io/queue-name: multislice-queue
          spec:
            nodeSelector:
              cloud.google.com/gke-nodepool: cpu-np
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            restartPolicy: Never
            # Launch Sidecars (Proxy + RM)
            initContainers:
            - name: pathways-proxy
              image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:latest
              args:
                - --server_port=29000
                - --resource_manager_address=localhost:29001
                - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              env:
                - name: PATHWAYS_HEAD
                  value: localhost
              resources:
                limits:
                  cpu: '16'
                  memory: 100G
              restartPolicy: Always
            - name: pathways-rm
              image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
              args:
                - --server_port=29001
                - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                - --node_type=resource_manager
                - --instance_count=1
                - --instance_type=tpuv5:2x4x4
              env:
                - name: HOST_ADDRESS
                  value: localhost
                - name: TPU_SKIP_MDS_QUERY
                  value: 'true'
              resources:
                limits:
                  cpu: '8'
                  memory: 32G
              restartPolicy: Always
            # Main Jax-TPU Coordinator Container
            containers:
            - name: jax-tpu
              image: europe-west4-docker.pkg.dev/cloud-tpu-multipod-dev/linchai-repo/tunix_base_image:frozenlake
              imagePullPolicy: Always
              command:
              - bash
              - -c
              - |
                echo XPK Start: $(date);
                echo "Waiting 90s for TPU worker hosts to pull images and initialize...";
                sleep 90;
                TPU_MIN_LOG_LEVEL=0 TF_CPP_MIN_LOG_LEVEL=0 TPU_STDERR_LOG_LEVEL=0 JAX_PLATFORMS=proxy,cpu JAX_BACKEND_TARGET=grpc://127.0.0.1:29000 ENABLE_PATHWAYS_PERSISTENCE='1' HF_TOKEN=hf_token WANDB_API_KEY=wandb_api_key PYTHONPATH=$PYTHONPATH:. ROLLOUT_ENGINE=vllm SKIP_JAX_PRECOMPILE=True  python3 -X faulthandler -u examples/frozenlake/train_frozenlake.py
              env:
              - name: PATHWAYS_HEAD
                value: localhost
              - name: HF_HOME
                value: /mnt/disks/linchai_data/huggingface
              - name: JAX_PLATFORMS
                value: proxy
              - name: JAX_BACKEND_TARGET
                value: grpc://$(PATHWAYS_HEAD):29000
              resources:
                limits:
                  cpu: '24'
                  memory: 300G
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
              - mountPath: /mnt/disks/linchai_data
                name: linchai-gke-disk
            volumes:
            - hostPath:
                path: /tmp
                type: DirectoryOrCreate
              name: shared-tmp
            - name: linchai-gke-disk
              persistentVolumeClaim:
                claimName: linchai-cpu-np-pvc

  - name: pathways-worker
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completions: 8
        parallelism: 8
        completionMode: Indexed
        template:
          metadata:
            labels:
              kueue.x-k8s.io/queue-name: multislice-queue
          spec:
            nodeSelector:
              cloud.google.com/gke-nodepool: linchai-v5p-64-pw-np-0
              cloud.google.com/gke-tpu-accelerator: tpu-v5p-slice
              cloud.google.com/gke-tpu-topology: 2x4x4
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            restartPolicy: Never
            containers:
            - name: pathways-worker
              image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
              args:
                - --server_port=29000
                - --resource_manager_address=frozenlake-pathways-head-0-0.frozenlake:29001
                - --node_type=worker
                - --instance_type=tpuv5:2x4x4
              resources:
                limits:
                  google.com/tpu: '4'
