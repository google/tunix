apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: lancewang-v5p-js-32b
  labels:
    kueue.x-k8s.io/queue-name: multislice-queue
    xpk.google.com/workload: lancewang-v5p-js-32b
spec:
  coordinator:
    replicatedJob: pathways-head
  failurePolicy:
    restartStrategy: Recreate
  network:
    enableDNSHostnames: true
    publishNotReadyAddresses: true
  startupPolicy:
    startupPolicyOrder: InOrder
  successPolicy:
    operator: All
    targetReplicatedJobs:
      - pathways-head
  replicatedJobs:
    - name: pathways-head
      replicas: 1
      template:
        metadata:
          annotations:
            alpha.jobset.sigs.k8s.io/exclusive-topology: kubernetes.io/hostname
        spec:
          backoffLimit: 0
          completionMode: Indexed
          completions: 1
          parallelism: 1
          template:
            metadata:
              annotations:
                alpha.jobset.sigs.k8s.io/exclusive-topology: kubernetes.io/hostname
            spec:
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              restartPolicy: Never
              nodeSelector:
                cloud.google.com/gke-nodepool: cpu-np-large-mem-disk
              volumes:
                - name: shared-tmp
                  hostPath:
                    path: /tmp
                    type: DirectoryOrCreate
              initContainers:
                - name: pathways-rm
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
                  imagePullPolicy: Always
                  args:
                    - --server_port=29001
                    - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                    - --node_type=resource_manager
                    - --instance_count=1
                    - --instance_type=tpuv5:2x2x4
                  env:
                    - name: REPLICATED_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                    - name: JOBSET_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                    - name: HOST_ADDRESS
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: TPU_SKIP_MDS_QUERY
                      value: "true"
                  ports:
                    - containerPort: 29001
                    - containerPort: 29002
                  resources:
                    limits:
                      cpu: "8"
                      memory: 16G
                  restartPolicy: Always
                - name: pathways-proxy
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/proxy_server:latest
                  imagePullPolicy: Always
                  args:
                    - --server_port=29000
                    - --resource_manager_address=$(PATHWAYS_HEAD):29001
                    - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                  env:
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                  ports:
                    - containerPort: 29000
                  resources:
                    limits:
                      cpu: "50"
                      memory: 320G
                  restartPolicy: Always
              containers:
                - name: jax-tpu
                  image: gcr.io/cloud-tpu-multipod-dev/lance_deepswe:latest
                  imagePullPolicy: Always
                  command:
                    - bash
                    - -c
                    - |
                      (while true; do echo "This loop runs forever"; done)
                  env:
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: JAX_PLATFORMS
                      value: proxy
                    - name: XCLOUD_ENVIRONMENT
                      value: GCP
                    - name: JAX_BACKEND_TARGET
                      value: grpc://$(PATHWAYS_HEAD):29000
                  resources:
                    limits:
                      cpu: "50"
                      memory: 200G
                  securityContext:
                    privileged: true
                  volumeMounts:
                    - mountPath: /tmp
                      name: shared-tmp
    - name: worker
      replicas: 1
      template:
        metadata:
          annotations:
            alpha.jobset.sigs.k8s.io/exclusive-topology: cloud.google.com/gke-nodepool
        spec:
          backoffLimit: 16
          completionMode: Indexed
          completions: 4
          parallelism: 4
          template:
            metadata:
              annotations:
                alpha.jobset.sigs.k8s.io/exclusive-topology: cloud.google.com/gke-nodepool
            spec:
              hostNetwork: true
              dnsPolicy: ClusterFirstWithHostNet
              priorityClassName: very-high
              restartPolicy: OnFailure
              terminationGracePeriodSeconds: 30
              nodeSelector:
                cloud.google.com/gke-tpu-accelerator: tpu-v5p-slice
                cloud.google.com/gke-tpu-topology: 2x2x4
              volumes:
                - name: shared-tmp
                  hostPath:
                    path: /tmp
                    type: DirectoryOrCreate
              containers:
                - name: pathways-worker
                  image: us-docker.pkg.dev/cloud-tpu-v2-images/pathways/server:latest
                  imagePullPolicy: Always
                  args:
                    - --server_port=29005
                    - --resource_manager_address=$(PATHWAYS_HEAD):29001
                    - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                  env:
                    - name: TPU_MIN_LOG_LEVEL
                      value: "0"
                    - name: TF_CPP_MIN_LOG_LEVEL
                      value: "0"
                    - name: XCLOUD_ENVIRONMENT
                      value: GCP
                    - name: MEGASCALE_GRPC_ENABLE_XOR_TRACER
                      value: "false"
                    - name: MEGASCALE_NUM_SLICES
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/replicatedjob-replicas']
                    - name: JOBSET_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/jobset-name']
                    - name: REPLICATED_JOB_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.annotations['jobset.sigs.k8s.io/replicatedjob-name']
                    - name: MEGASCALE_SLICE_ID
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/job-index']
                    - name: PATHWAYS_HEAD
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                    - name: MEGASCALE_COORDINATOR_ADDRESS
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.labels['jobset.sigs.k8s.io/coordinator']
                  ports:
                    - containerPort: 29005
                    - containerPort: 29006
                    - containerPort: 8471
                    - containerPort: 8080
                  resources:
                    limits:
                      google.com/tpu: "4"
                  volumeMounts:
                    - mountPath: /tmp
                      name: shared-tmp
