apiVersion: jobset.x-k8s.io/v1alpha2
kind: JobSet
metadata:
  name: qwen3-1p7b-grpo
  namespace: default
  labels:
    kueue.x-k8s.io/queue-name: multislice-queue
spec:
  failurePolicy:
    maxRestarts: 0
  replicatedJobs:
  # -------------------------------------------------------------
  # 1. PATHWAYS COORDINATOR (CPU HEAD)
  # -------------------------------------------------------------
  - name: pathways-head
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        template:
          metadata:
            labels:
              kueue.x-k8s.io/queue-name: multislice-queue
          spec:
            nodeSelector:
              cloud.google.com/gke-nodepool: cpu-np
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            restartPolicy: Never
            # Launch Sidecars (Proxy + RM)
            initContainers:
            - name: pathways-proxy
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/lukebaumann/unsanitized_proxy_server@sha256:6022630f749b1bf85940a92c1b595cc59b643a6ab2d1dae77aeea5033d9fcaf9
              args:
                - --server_port=29000
                - --resource_manager_address=localhost:29001
                - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
              env:
                - name: PATHWAYS_HEAD
                  value: localhost
              resources:
                limits:
                  cpu: '16'
                  memory: 500G
              restartPolicy: Always
            - name: pathways-rm
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/lukebaumann/unsanitized_server@sha256:db6d3db6090cc41daca3cc81bc70a15be94d33e6c881d8acaf6de5c9194dd9c2
              args:
                - --server_port=29001
                - --gcs_scratch_location=gs://cloud-pathways-staging/tmp
                - --node_type=resource_manager
                - --instance_count=1
                - --instance_type=tpuv5:4x4x4
              env:
                - name: HOST_ADDRESS
                  value: localhost
                - name: TPU_SKIP_MDS_QUERY
                  value: 'true'
              resources:
                limits:
                  cpu: '8'
                  memory: 100G
              restartPolicy: Always
            # Main Jax-TPU Coordinator Container
            containers:
            - name: jax-tpu
              image: europe-west4-docker.pkg.dev/cloud-tpu-multipod-dev/yuxzhang-repo/tunix_base_image:latest
              imagePullPolicy: Always
              command:
              - bash
              - -c
              - |
                echo XPK Start: $(date);
                echo "Syncing latest code from yuxzhang/refactor_loss_accum_ablation..."
                git config --global --add safe.directory $(pwd)
                git init
                git remote set-url origin https://github.com/google/tunix.git 2>/dev/null || git remote add origin https://github.com/google/tunix.git
                git fetch origin yuxzhang/refactor_loss_accum_ablation
                git reset --hard FETCH_HEAD

                # [model] qwen3-1.7b-base is pulled from HuggingFace (not gated,
                # so HF_TOKEN's account needs no license acceptance). No LoRA
                # (lora_config left empty) => full fine-tuning, matching the
                # agentic qwen3 demo (USE_LORA=False). Vanilla rollout, no vLLM
                # ROPE hot-patch.

                echo "Waiting 60s for TPU worker hosts to pull images and initialize...";
                sleep 60;
                echo "GSM8K (tfds) + qwen3-1.7b-base (HF) are pulled inside grpo_main; no separate data step."

                # [mesh] (16,4)=64. qwen3-1.7b shards cleanly: fsdp on embed=2048
                # (2048/16=128), tp on heads (num_kv_heads=8 => 8/4=2, num_heads
                # 16 => 4). No small-axis issue (unlike gemma's C=2).
                # [batch] batch dims divisible by fsdp=16: micro/logps=16, rollout
                # 64*8=512 / 16 = 32.
                # Hyperparams aligned with the agentic qwen3 gsm8k run: full FT,
                # lr=2e-7 (adamw, cosine, wd=0.01, b2=0.999, grad_norm=1.0),
                # num_generations=8, beta=0.04, kl_loss_mode=mse_kl. max_steps=100
                # (trend); eval + checkpoint effectively off for this experiment.
                # Rollout seq kept shorter (768/256) for speed (agentic 1024/1024).
                export TPU_MIN_LOG_LEVEL=0 TF_CPP_MIN_LOG_LEVEL=0 TPU_STDERR_LOG_LEVEL=0 && \
                export JAX_PLATFORMS=proxy,cpu JAX_BACKEND_TARGET=grpc://127.0.0.1:29000 && \
                export ENABLE_PATHWAYS_PERSISTENCE='1' && \
                export HF_TOKEN=$(echo -n $INJECTED_HF_TOKEN | xargs) && \
                export WANDB_API_KEY=$(echo -n $INJECTED_WANDB_API_KEY | xargs) && \
                export PYTHONPATH=$PYTHONPATH:. SKIP_JAX_PRECOMPILE=True && \
                export FLAGS_pathways_enforce_subset_devices_form_subslice=False && \
                rm -rf /tmp/ckpts_qwen3_grpo /tmp/intermediate_ckpt && \
                python3 -X faulthandler -u -m tunix.cli.grpo_main \
                  tunix/cli/base_config.yaml \
                  model_config.model_name=qwen3-1.7b-base \
                  model_config.model_id=Qwen/qwen3-1.7b-base \
                  model_config.model_source=huggingface \
                  model_config.use_flash_attention=true \
                  model_config.flash_attention_block_size=128 \
                  model_config.intermediate_ckpt_dir="None" \
                  model_config.model_download_path="/tmp/models/qwen3-1.7b-base" \
                  model_config.mesh.shape="(16,4)" \
                  model_config.mesh.axis_names="('fsdp','tp')" \
                  model_config.rng_seed=42 \
                  model_config.remat_config=3 \
                  actor_model_config.mesh.shape="(16,4)" \
                  actor_model_config.mesh.axis_names="('fsdp','tp')" \
                  reference_model_config.mesh=null \
                  reference_model_config.same_mesh_as="actor" \
                  rollout_model_config.mesh=null \
                  rollout_model_config.same_mesh_as="actor" \
                  tokenizer_config.tokenizer_path=Qwen/qwen3-1.7b-base \
                  tokenizer_config.tokenizer_type=huggingface \
                  tokenizer_config.add_bos=false \
                  dataset_name="gsm8k" \
                  batch_size=64 \
                  num_test_batches=100 \
                  num_train_epochs=1 \
                  train_fraction=0.8 \
                  rl_training_config.actor_optimizer_config.opt_type="adamw" \
                  rl_training_config.actor_optimizer_config.peak_value=2e-7 \
                  rl_training_config.actor_optimizer_config.schedule_type="warmup_cosine_decay_schedule" \
                  rl_training_config.actor_optimizer_config.init_value=0.0 \
                  rl_training_config.actor_optimizer_config.end_value=0.0 \
                  rl_training_config.actor_optimizer_config.warmup_steps=10 \
                  rl_training_config.actor_optimizer_config.decay_steps=100 \
                  rl_training_config.actor_optimizer_config.b1=0.9 \
                  rl_training_config.actor_optimizer_config.b2=0.999 \
                  rl_training_config.actor_optimizer_config.weight_decay=0.01 \
                  rl_training_config.actor_optimizer_config.max_grad_norm=1.0 \
                  rl_training_config.eval_every_n_steps=100000 \
                  rl_training_config.max_steps=100 \
                  rl_training_config.metrics_logging_options.log_dir="/tmp/tensorboard/qwen3" \
                  rl_training_config.metrics_logging_options.flush_every_n_steps=20 \
                  rl_training_config.checkpoint_root_directory="/tmp/ckpts_qwen3_grpo" \
                  rl_training_config.checkpointing_options.save_interval_steps=100000 \
                  rl_training_config.mini_batch_size=64 \
                  rl_training_config.train_micro_batch_size=16 \
                  rl_training_config.compute_logps_micro_batch_size=16 \
                  rollout_config.total_generation_steps=768 \
                  rollout_config.max_prompt_length=256 \
                  rollout_config.temperature=1.0 \
                  rollout_config.top_p=1.0 \
                  rollout_engine="vanilla" \
                  offload_to_cpu=false \
                  grpo_config.num_generations=8 \
                  grpo_config.num_iterations=1 \
                  grpo_config.beta=0.04 \
                  grpo_config.epsilon=0.2 \
                  grpo_config.kl_loss_mode="mse_kl" \
                  reward_functions="['tunix/cli/reward_fn/gsm8k.py']"
              env:
              - name: PATHWAYS_HEAD
                value: localhost
              - name: INJECTED_HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: yuxzhang-secrets
                    key: HF_TOKEN
                    optional: true
              - name: INJECTED_WANDB_API_KEY
                valueFrom:
                  secretKeyRef:
                    name: yuxzhang-secrets
                    key: WANDB_API_KEY
                    optional: true
              - name: HF_HOME
                value: /mnt/disks/linchai_data/huggingface
              - name: JAX_PLATFORMS
                value: proxy
              - name: JAX_BACKEND_TARGET
                value: grpc://$(PATHWAYS_HEAD):29000
              - name: FLAGS_pathways_enforce_subset_devices_form_subslice
                value: "False"
              resources:
                limits:
                  cpu: '24'
                  memory: 300G
              volumeMounts:
              - mountPath: /tmp
                name: shared-tmp
              - mountPath: /mnt/disks/linchai_data
                name: linchai-gke-disk-2
            volumes:
            - hostPath:
                path: /tmp
                type: DirectoryOrCreate
              name: shared-tmp
            - name: linchai-gke-disk-2
              persistentVolumeClaim:
                claimName: linchai-cpu-np-pvc-2

  - name: pathways-worker
    replicas: 1
    template:
      spec:
        backoffLimit: 0
        completions: 16
        parallelism: 16
        completionMode: Indexed
        template:
          metadata:
            labels:
              kueue.x-k8s.io/queue-name: multislice-queue
          spec:
            nodeSelector:
              cloud.google.com/gke-nodepool: linchai-v5p-128-pw-np-0
              cloud.google.com/gke-tpu-accelerator: tpu-v5p-slice
              cloud.google.com/gke-tpu-topology: 4x4x4
            hostNetwork: true
            dnsPolicy: ClusterFirstWithHostNet
            restartPolicy: Never
            containers:
            - name: pathways-worker
              image: us-docker.pkg.dev/cloud-tpu-v2-images-dev/pathways/gke/lukebaumann/unsanitized_server@sha256:db6d3db6090cc41daca3cc81bc70a15be94d33e6c881d8acaf6de5c9194dd9c2
              args:
                - --server_port=29000
                - --resource_manager_address=qwen3-1p7b-grpo-pathways-head-0-0.qwen3-1p7b-grpo:29001
                - --node_type=worker
                - --instance_type=tpuv5:4x4x4
              env:
                - name: XLA_PYTHON_CLIENT_PREALLOCATE
                  value: 'true'
                - name: XLA_PYTHON_CLIENT_MEM_FRACTION
                  value: '0.9'
                - name: ENABLE_PATHWAYS_PERSISTENCE
                  value: '0'
              resources:
                limits:
                  google.com/tpu: '4'
